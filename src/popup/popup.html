<!doctype html>
<html lang="en">

<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>twitter-no</title>
  <link rel="stylesheet" href="popup.css">
</head>

<body>
  <section class="window" aria-label="twitter-no">
    <header class="titlebar">
      <h1>twitter-no</h1>
      <button id="close-popup" class="window-button" type="button" aria-label="close popup">x</button>
    </header>

    <div class="window-body">
      <div class="status-row">
        <span class="status-label">status</span>
        <span id="status" class="status-value">on</span>
      </div>

      <label class="switch" aria-label="enable or disable twitter-no">
        <span class="switch-label">enabled</span>
        <input id="enabled" type="checkbox">
        <span class="slider"></span>
      </label>

      <div id="auto-enable-row" class="auto-enable-row">
        <label class="auto-enable-label" aria-label="turn on auto-enable">
          <input id="auto-enable" class="auto-enable-checkbox" type="checkbox">
          <span class="checkbox-box" aria-hidden="true"></span>
          <span class="status-label">auto-enable after</span>
        </label>
        <label class="auto-enable-control" aria-label="auto-enable after minutes">
          <span class="muted-label auto-enable-unit">mins</span>
          <input id="auto-enable-minutes" class="auto-enable-minutes" type="number" min="1" max="999" step="1" value="5" inputmode="numeric">
        </label>
      </div>

      <div class="status-row">
        <span class="status-label split-label"><span>no-count</span><span class="muted-label">total</span></span>
        <span id="no-count" class="status-value">0</span>
      </div>

      <div class="status-row">
        <span class="status-label split-label"><span>no-count</span><span class="muted-label">this week</span></span>
        <span id="no-count-week" class="status-value">0</span>
      </div>
    </div>
  </section>

  <section class="window chart-window" aria-label="no-count graph">
    <header class="titlebar">
      <h1 id="chart-title">this-week</h1>
      <div class="titlebar-actions">
        <button id="toggle-chart-week" class="photo-button" type="button" aria-label="show last week's data">last week</button>
        <button id="copy-chart" class="photo-button" type="button" aria-label="copy graph as image">photo</button>
      </div>
    </header>

    <div class="window-body chart-body">
      <svg id="week-chart" class="week-chart" viewBox="0 0 320 288" role="img" aria-label="access attempts by day and hour this week"></svg>
    </div>
  </section>

  <footer class="popup-footer">
    <a class="support-link" href="https://ko-fi.com/swamigallardo" target="_blank" rel="noopener noreferrer">
      <img src="coffee.svg" alt="(c)" class="coffee-icon">
      <span>support me on ko-fi</span>
    </a>
    <a id="version" class="version" href="https://github.com/gallardoS/twitter-no" target="_blank" rel="noopener noreferrer">v...</a>
  </footer>

  <script src="popup.js"></script>
</body>

</html>
